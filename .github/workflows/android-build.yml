name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Supabase の認証情報は GitHub Secrets から環境変数として渡す。
    # build.gradle.kts は local.properties が無い場合これらの環境変数を読む。
    # 設定場所: Settings > Secrets and variables > Actions
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.SUPABASE_GOOGLE_WEB_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # debug ビルドは debug 署名が自動付与されるため、そのまま端末にインストールできる。
      # 動作確認用にはこちらの artifact を使うのが手軽。
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # release（署名済み配布用）。keystore Secrets が設定されている場合のみ署名される。
      # 未設定だと unsigned APK となりインストール不可なので、配布時は keystore Secrets を設定すること。
      - name: Build release APK
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RELEASE_KEYSTORE_PATH"
          ./gradlew assembleRelease

      - name: Upload release APK
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
